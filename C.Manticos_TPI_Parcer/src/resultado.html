<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Smart Home - Panel de Control</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 30px; color: #333; }
    h1 { color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
    .bloque-evento { background: white; border-radius: 8px; border-left: 6px solid #1a73e8; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .bloque-every { background: white; border-radius: 8px; border-left: 6px solid #f4b400; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .condicion { font-weight: bold; color: #5f6368; margin-bottom: 15px; font-size: 1.1em; }
    ul { list-style-type: none; padding-left: 0; }
    li { background: #f8f9fa; padding: 10px 15px; margin: 5px 0; border-radius: 4px; border: 1px solid #dadce0; }
    .accion-foco { border-left: 4px solid #4285f4; }
    .accion-aire { border-left: 4px solid #0f9d58; }
    .accion-altavoz { border-left: 4px solid #ab47bc; }
  </style>
</head>
<body>
  <h1>Panel de Control Smart Home</h1>
</body>
</html>
